<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部文章 - 物理小屋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #3b82f6; --secondary: #06b6d4; --bg: #f8fafc; --card: #fff; --text: #1e293b; --text-light: #64748b; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: var(--bg); }
        header { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 0.8rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: white; font-size: 1.2rem; font-weight: bold; }
        .logo a { color: white; text-decoration: none; }
        .nav a { color: rgba(255,255,255,0.9); text-decoration: none; margin-left: 1rem; }
        main { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .page-title { font-size: 1.5rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--primary); }
        .filter { display: flex; gap: 0.8rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-btn { padding: 0.5rem 1rem; background: var(--card); border: 2px solid #e2e8f0; border-radius: 20px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .article-list { display: grid; gap: 1rem; }
        .article-item { background: var(--card); padding: 1.5rem; border-radius: 12px; box-shadow: 0 3px 15px rgba(0,0,0,0.08); transition: all 0.3s; }
        .article-item:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .article-item a { text-decoration: none; color: var(--text); display: block; }
        .article-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
        .article-meta { font-size: 0.85rem; color: var(--text-light); margin-bottom: 0.5rem; }
        .article-desc { font-size: 0.9rem; color: var(--text-light); }
        .tag { display: inline-block; padding: 0.2rem 0.6rem; background: var(--primary); color: white; border-radius: 15px; font-size: 0.75rem; margin-right: 0.5rem; }
        .empty { text-align: center; padding: 3rem; color: var(--text-light); }
        footer { background: #1e293b; color: rgba(255,255,255,0.7); text-align: center; padding: 1.5rem; margin-top: 2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html"><i class="fas fa-atom"></i> 物理小屋</a></div>
        <nav class="nav">
            <a href="index.html">首页</a>
            <a href="posts.html">文章</a>
            <a href="videos.html">视频</a>
            <a href="papers.html">试卷</a>
            <a href="about.html">关于</a>
        </nav>
    </header>
    <main>
        <h1 class="page-title">📚 全部文章</h1>
        <div class="filter" id="gradeFilter">
            <span class="filter-btn active" data-grade="全部">全部</span>
            <span class="filter-btn" data-grade="八年级上">八年级上</span>
            <span class="filter-btn" data-grade="八年级下">八年级下</span>
            <span class="filter-btn" data-grade="九年级">九年级</span>
        </div>
        <div class="article-list" id="articleList">
            <div class="empty">加载中...</div>
        </div>
    </main>
    <footer><p>© 2026 物理小屋 | <a href="admin.html" style="color:#64748b;">管理后台</a></p></footer>

    <script>
        // NAS API地址
        const API_URL = 'http://192.168.1.222:3000';
        
        let allPosts = [];
        let currentFilter = '全部';
        
        // 加载文章
        async function loadPosts() {
            try {
                const response = await fetch(API_URL + '/api/posts');
                const result = await response.json();
                if (result.success && result.data) {
                    allPosts = result.data;
                } else {
                    allPosts = getDefaultPosts();
                }
            } catch (e) {
                console.log('加载失败，使用默认数据', e);
                allPosts = getDefaultPosts();
            }
            renderPosts();
        }
        
        // 默认文章数据
        function getDefaultPosts() {
            return [
                {id:1,title:'机械运动精讲',description:'长度、时间、速度...',grade:'八年级上',chapter:'机械运动',date:'2026-03-22',views:328,file:'posts/wuli-001.html'},
                {id:2,title:'电压是什么？',description:'用水流来理解电压！',grade:'九年级',chapter:'电压',date:'2026-03-22',views:428,file:'posts/wuli-002.html'},
                {id:3,title:'串联并联so easy',description:'串联并联电路轻松理解！',grade:'九年级',chapter:'电流',date:'2026-03-17',views:356,file:'posts/wuli-003.html'}
            ];
        }
        
        // 渲染文章列表
        function renderPosts() {
            const list = document.getElementById('articleList');
            const filtered = currentFilter === '全部' ? allPosts : allPosts.filter(p => p.grade === currentFilter);
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty">暂无文章，快去发布吧！</div>';
                return;
            }
            
            list.innerHTML = filtered.map(post => `
                <div class="article-item">
                    <a href="${post.file || '#'}">
                        <h3 class="article-title">${post.title}</h3>
                        <p class="article-meta">
                            <span class="tag">${post.grade}</span>
                            ${post.chapter || ''} · ${post.date || ''} · <i class="far fa-eye"></i> ${post.views || 0}
                        </p>
                        <p class="article-desc">${post.description || ''}</p>
                    </a>
                </div>
            `).join('');
        }
        
        // 筛选
        document.getElementById('gradeFilter').addEventListener('click', function(e) {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.grade;
                renderPosts();
            }
        });
        
        // 初始化
        loadPosts();
    </script>
</body>
</html>
