<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 物理小屋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        const correctPassword = "342002";
        const enteredPassword = prompt("请输入管理后台密码：");
        if (enteredPassword !== correctPassword) {
            alert("密码错误！只有管理员可以进入。");
            location.href = "index.html";
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #3b82f6; --success: #10b981; --warning: #f59e0b;
            --danger: #ef4444; --dark: #1e293b; --bg: #f1f5f9; --card: #fff;
            --text: #1e293b; --text-light: #64748b;
        }
        body { font-family: 'Microsoft YaHei', sans-serif; background: var(--bg); min-height: 100vh; }
        
        .sidebar { width: 220px; background: var(--dark); color: white; position: fixed; top: 0; left: 0; bottom: 0; padding: 1rem; overflow-y: auto; }
        .logo { font-size: 1.2rem; font-weight: bold; padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 1rem; }
        .logo i { margin-right: 0.5rem; }
        .menu-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1rem; border-radius: 10px; cursor: pointer; transition: all 0.3s; margin-bottom: 0.3rem; }
        .menu-item:hover, .menu-item.active { background: var(--primary); }
        
        .main { margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; }
        
        .card { background: var(--card); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px solid #e2e8f0; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.6rem; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem;
        }
        .form-group textarea { min-height: 150px; font-family: inherit; }
        
        .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-copy { background: var(--warning); color: white; }
        
        .result-code {
            background: #1e293b;
            color: #10b981;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.85rem;
        }
        
        .guide { background: #eff6ff; padding: 1rem; border-radius: 8px; border-left: 4px solid var(--primary); margin-bottom: 1rem; }
        .guide h3 { color: var(--primary); margin-bottom: 0.5rem; }
        .guide ol { padding-left: 1.2rem; color: var(--text); }
        .guide li { margin-bottom: 0.3rem; }
        
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar .logo span, .sidebar .menu-item span { display: none; }
            .main { margin-left: 60px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="logo"><i class="fas fa-cog"></i> <span>管理后台</span></div>
        <div class="menu-item active" data-page="publish"><i class="fas fa-plus-circle"></i> <span>发布文章</span></div>
        <div class="menu-item" data-page="videos"><i class="fas fa-video"></i> <span>发布视频</span></div>
        <div class="menu-item" data-page="papers"><i class="fas fa-file-pdf"></i> <span>发布试卷</span></div>
        <div class="menu-item" onclick="location.href='index.html'"><i class="fas fa-home"></i> <span>返回首页</span></div>
    </nav>
    
    <main class="main">
        <div class="header">
            <h1>📝 发布文章</h1>
        </div>
        
        <!-- 使用说明 -->
        <div class="guide">
            <h3>📖 发布文章简易教程</h3>
            <ol>
                <li>填写下面的表单（标题、内容、选择年级/章节）</li>
                <li>点击「🔄 生成HTML代码」按钮</li>
                <li>复制生成的代码（点击📋按钮）</li>
                <li>在GitHub仓库点「Add file」→「Create new file」</li>
                <li>文件名填写：posts/文章标题.html（如 posts/wuli-001.html）</li>
                <li>粘贴代码，Commit提交就可以发布了！</li>
            </ol>
        </div>
        
        <!-- 发布表单 -->
        <div class="card">
            <h2>📝 文章信息</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>文章标题 *</label>
                    <input type="text" id="title" placeholder="如：机械运动精讲">
                </div>
                <div class="form-group">
                    <label>文章类型 *</label>
                    <select id="type">
                        <option value="article">📝 图文文章</option>
                        <option value="video">🎬 视频介绍</option>
                        <option value="paper">📄 试卷资料</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>所属年级 *</label>
                    <select id="grade">
                        <option value="">请选择年级</option>
                        <option value="八年级上">📚 八年级上</option>
                        <option value="八年级下">⚙️ 八年级下</option>
                        <option value="九年级">🔥 九年级</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>所属章节 *</label>
                    <select id="chapter">
                        <option value="">请先选择年级</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>文章简介 *</label>
                <textarea id="description" placeholder="请输入文章简介，会显示在列表中..."></textarea>
            </div>
            <div class="form-group">
                <label>文章内容（详细）</label>
                <textarea id="content" placeholder="请输入详细文章内容，可以使用HTML标签..." style="min-height: 200px;"></textarea>
            </div>
            <button class="btn btn-success" onclick="generateCode()">🔄 生成HTML代码</button>
        </div>
        
        <!-- 生成结果 -->
        <div class="card" id="resultCard" style="display:none;">
            <h2>📋 生成的HTML代码</h2>
            <p style="color: #64748b; margin-bottom: 1rem;">请复制下面的代码，然后在GitHub上创建新文件保存！</p>
            <button class="btn btn-copy" onclick="copyCode()">📋 复制代码</button>
            <pre class="result-code" id="resultCode"></pre>
        </div>
    </main>
    
    <script>
        // 年级-章节 数据
        const chapterData = {
            '八年级上': ['机械运动', '声现象', '物态变化', '光现象', '透镜'],
            '八年级下': ['力', '运动和力', '压强', '浮力', '功和机械能'],
            '九年级': ['内能', '内能的利用', '电流和电路', '电压电阻', '欧姆定律', '电功率', '生活用电', '电磁']
        };
        
        // 年级切换联动章节
        document.getElementById('grade').addEventListener('change', function() {
            const grade = this.value;
            const chapterSelect = document.getElementById('chapter');
            chapterSelect.innerHTML = '<option value="">请选择章节</option>';
            if (grade && chapterData[grade]) {
                chapterData[grade].forEach(ch => {
                    chapterSelect.innerHTML += `<option value="${ch}">${ch}</option>`;
                });
            }
        });
        
        // 生成HTML代码
        function generateCode() {
            const title = document.getElementById('title').value;
            const type = document.getElementById('type').value;
            const grade = document.getElementById('grade').value;
            const chapter = document.getElementById('chapter').value;
            const description = document.getElementById('description').value;
            const content = document.getElementById('content').value;
            
            if (!title || !grade || !chapter || !description) {
                alert('请填写必填项（标题、年级、章节、简介）！');
                return;
            }
            
            // 生成文件名
            const filename = title.toLowerCase().replace(/[^\u4e00-\u9fa5a-z0-9]/g, '-').substring(0, 30) + '.html';
            const date = new Date().toISOString().slice(0, 10);
            
            // 类型对应图标
            const typeIcons = { 'article': '📝', 'video': '🎬', 'paper': '📄' };
            const typeColors = { 'article': '#8b5cf6', 'video': '#ef4444', 'paper': '#3b82f6' };
            
            const html = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title} - 物理小屋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #3b82f6; --bg: #f8fafc; --card: #fff; --text: #1e293b; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: var(--bg); }
        header { background: linear-gradient(135deg, var(--primary), #06b6d4); padding: 1rem 2rem; }
        .logo { color: white; font-size: 1.2rem; font-weight: bold; }
        .logo a { color: white; text-decoration: none; }
        main { max-width: 800px; margin: 0 auto; padding: 2rem; }
        .card { background: var(--card); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 3px 15px rgba(0,0,0,0.08); }
        .tag { display: inline-block; padding: 0.3rem 0.8rem; background: var(--primary); color: white; border-radius: 20px; font-size: 0.8rem; margin-bottom: 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        .meta { color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .content { line-height: 1.8; color: var(--text); }
        .content img { max-width: 100%; border-radius: 8px; margin: 1rem 0; }
        footer { background: #1e293b; color: rgba(255,255,255,0.7); text-align: center; padding: 1.5rem; }
    </style>
</head>
<body>
    <header><div class="logo"><a href="index.html"><i class="fas fa-atom"></i> 物理小屋</a></div></header>
    <main>
        <article class="card">
            <span class="tag">${grade} · ${chapter}</span>
            <h1>${title}</h1>
            <p class="meta">发布时间：${date} · 浏览：0</p>
            <div class="content">${content}</div>
        </article>
    </main>
    <footer><p>© 2026 物理小屋 | <a href="index.html" style="color:white;">返回首页</a></p></footer>
</body>
</html>`;
            
            document.getElementById('resultCode').textContent = html;
            document.getElementById('resultCard').style.display = 'block';
        }
        
        // 复制代码
        function copyCode() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ 代码已复制！\n\n下一步：\n1. 去GitHub仓库\n2. 点Add file → Create new file\n3. 文件名写：posts/' + document.getElementById('title').value.substring(0,20) + '.html\n4. 粘贴代码，提交');
            });
        }
    </script>
</body>
</html>
